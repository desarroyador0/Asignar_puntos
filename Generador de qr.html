<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>FideliApp — Mi QR</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --bg:      #f0ede8;
      --card:    #ffffff;
      --dark:    #151210;
      --accent:  #e8410a;
      --accent2: #ff6b35;
      --muted:   #9a9490;
      --border:  #e0dbd4;
      --radius:  20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--dark);
      position: relative;
      overflow-x: hidden;
    }

    /* grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999;
    }

    /* big decorative bg letter */
    body::before {
      content: 'QR';
      position: fixed;
      bottom: -40px; right: -20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 220px;
      color: rgba(0,0,0,.04);
      pointer-events: none;
      z-index: 0;
      line-height: 1;
      user-select: none;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 0 0 40px;
    }

    /* ── HEADER ── */
    header {
      padding: 36px 28px 0;
      margin-bottom: 32px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .brand-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 2px;
      color: var(--muted);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 1px;
      line-height: 1;
      color: var(--dark);
    }

    header h1 span { color: var(--accent); }

    header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── STEP 1: input ── */
    #step-input {
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .phone-input-wrap {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color .2s;
    }

    .phone-input-wrap:focus-within {
      border-color: var(--accent);
    }

    .phone-prefix {
      padding: 0 14px;
      font-size: 20px;
      color: var(--muted);
      flex-shrink: 0;
    }

    input[type="tel"], input[type="number"] {
      flex: 1;
      padding: 16px 16px 16px 0;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
      -moz-appearance: textfield;
      width: 100%;
    }

    input[type="tel"]::-webkit-outer-spin-button,
    input[type="tel"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }

    input::placeholder { color: var(--border); font-weight: 400; }

    .btn-generate {
      width: 100%;
      padding: 18px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-generate:hover { background: #2a2a2a; }
    .btn-generate:active { transform: scale(.98); }

    .hint-text {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ── STEP 2: QR ── */
    #step-qr {
      display: none;
      padding: 0 24px;
      flex-direction: column;
      gap: 20px;
      animation: fadeUp .4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .qr-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .qr-label-top {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      align-self: flex-start;
    }

    .qr-frame {
      background: #fff;
      border: 3px solid var(--dark);
      border-radius: 16px;
      padding: 16px;
      position: relative;
    }

    /* corner accents */
    .qr-frame::before, .qr-frame::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
    }

    .qr-frame::before {
      top: -3px; left: -3px;
      border-top: 4px solid var(--accent);
      border-left: 4px solid var(--accent);
      border-radius: 4px 0 0 0;
    }

    .qr-frame::after {
      bottom: -3px; right: -3px;
      border-bottom: 4px solid var(--accent);
      border-right: 4px solid var(--accent);
      border-radius: 0 0 4px 0;
    }

    #qr-output { line-height: 0; }
    #qr-output img, #qr-output canvas { display: block; border-radius: 4px; }

    .qr-info {
      align-self: stretch;
      background: var(--bg);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qr-info-icon { font-size: 22px; flex-shrink: 0; }

    .qr-info-text .name {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
    }

    .qr-info-text .tel {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .btn-back {
      width: 100%;
      padding: 16px;
      background: transparent;
      color: var(--dark);
      border: 2px solid var(--border);
      border-radius: 14px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-back:hover { border-color: var(--dark); }
    .btn-back:active { transform: scale(.98); }

    /* pulse ring around QR when just generated */
    @keyframes ringPulse {
      0%   { box-shadow: 0 0 0 0 rgba(232,65,10,.4); }
      70%  { box-shadow: 0 0 0 20px rgba(232,65,10,0); }
      100% { box-shadow: 0 0 0 0 rgba(232,65,10,0); }
    }

    .qr-frame.pulse { animation: ringPulse .8s ease; }

    /* error msg */
    .error-msg {
      background: #fff0ed;
      border: 1px solid #fca89a;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #c0392b;
      display: none;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">FIDELIAPP</span>
    </div>
    <h1>Tu código <span>QR</span></h1>
    <p>Ingresá tu número de teléfono y mostrá el QR al cajero para sumar puntos.</p>
  </header>

  <!-- STEP 1: INPUT -->
  <div id="step-input">
    <div class="input-card">
      <div>
        <div class="field-label">Número de teléfono</div>
        <div class="phone-input-wrap">
          <span class="phone-prefix">📱</span>
          <input
            type="tel"
            id="tel-input"
            placeholder="1123456789"
            inputmode="numeric"
            maxlength="20"
            onkeydown="if(event.key==='Enter') generarQR()"
          />
        </div>
      </div>
      <div class="error-msg" id="error-msg">
        ⚠ Ingresá un número de teléfono válido.
      </div>
      <button class="btn-generate" onclick="generarQR()">
        <span>⬛</span> Generar QR
      </button>
    </div>
    <p class="hint-text">
      El código QR se genera a partir de tu número de teléfono.<br/>
      No compartás tu QR con otras personas.
    </p>
  </div>

  <!-- STEP 2: QR -->
  <div id="step-qr">
    <div class="qr-card">
      <div class="qr-label-top">Mostrá este código al cajero</div>

      <div class="qr-frame" id="qr-frame">
        <div id="qr-output"></div>
      </div>

      <div class="qr-info">
        <div class="qr-info-icon">📱</div>
        <div class="qr-info-text">
          <div class="name" id="qr-name">—</div>
          <div class="tel"  id="qr-tel">—</div>
        </div>
      </div>
    </div>

    <button class="btn-back" onclick="volver()">
      ← Cambiar número
    </button>
  </div>
</div>

<script>
  let qrInstance = null;

  function generarQR() {
    const tel = document.getElementById('tel-input').value.trim().replace(/\D/g,'');
    const err = document.getElementById('error-msg');

    if (tel.length < 7) {
      err.style.display = 'block';
      document.getElementById('tel-input').focus();
      return;
    }
    err.style.display = 'none';

    // Render QR
    const container = document.getElementById('qr-output');
    container.innerHTML = '';

    if (qrInstance) { qrInstance = null; }

    qrInstance = new QRCode(container, {
      text:         tel,
      width:        220,
      height:       220,
      colorDark:    '#151210',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

    document.getElementById('qr-name').textContent = 'Teléfono registrado';
    document.getElementById('qr-tel').textContent  = tel;

    // Switch views
    document.getElementById('step-input').style.display = 'none';
    const stepQR = document.getElementById('step-qr');
    stepQR.style.display = 'flex';

    // Pulse effect
    setTimeout(() => {
      const frame = document.getElementById('qr-frame');
      frame.classList.add('pulse');
      setTimeout(() => frame.classList.remove('pulse'), 800);
    }, 100);
  }

  function volver() {
    document.getElementById('step-qr').style.display   = 'none';
    document.getElementById('step-input').style.display = 'flex';
    document.getElementById('tel-input').value = '';
    document.getElementById('tel-input').focus();
  }
</script>
</body>
</html>
